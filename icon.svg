<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- fond dégradé sombre -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <!-- balle jaune -->
    <radialGradient id="ball1" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="60%" stop-color="#e8c800"/>
      <stop offset="100%" stop-color="#a08800"/>
    </radialGradient>
    <!-- balle orange cible -->
    <radialGradient id="ball2" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="60%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#bb2200"/>
    </radialGradient>
    <!-- balle jaune petite -->
    <radialGradient id="ball3" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="60%" stop-color="#e8c800"/>
      <stop offset="100%" stop-color="#a08800"/>
    </radialGradient>
  </defs>

  <!-- fond arrondi -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- boite fil de fer -->
  <g stroke="#666" stroke-width="1.2" fill="none" opacity="0.7">
    <!-- face avant -->
    <rect x="18" y="28" width="92" height="72" rx="2"/>
    <!-- face arrière décalée -->
    <rect x="26" y="20" width="92" height="72" rx="2" opacity="0.4"/>
    <!-- arêtes de connexion -->
    <line x1="18" y1="28" x2="26" y2="20"/>
    <line x1="110" y1="28" x2="118" y2="20"/>
    <line x1="110" y1="100" x2="118" y2="92"/>
    <line x1="18" y1="100" x2="26" y2="92"/>
  </g>

  <!-- balle jaune bas gauche -->
  <circle cx="42" cy="80" r="16" fill="url(#ball1)"/>
  <!-- bande verticale balle 1 -->
  <ellipse cx="42" cy="80" rx="3.5" ry="16" fill="#1a1400" opacity="0.55"/>
  <!-- bande horizontale balle 1 -->
  <ellipse cx="42" cy="80" rx="16" ry="3.5" fill="#1a1400" opacity="0.55"/>

  <!-- balle orange cible (plus grande, mise en avant) -->
  <circle cx="82" cy="56" r="20" fill="url(#ball2)"/>
  <!-- halo orange discret -->
  <circle cx="82" cy="56" r="22" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>
  <!-- bande verticale balle 2 -->
  <ellipse cx="82" cy="56" rx="4" ry="20" fill="#220800" opacity="0.55"/>
  <!-- bande horizontale balle 2 -->
  <ellipse cx="82" cy="56" rx="20" ry="4" fill="#220800" opacity="0.55"/>

  <!-- petite balle jaune haut gauche -->
  <circle cx="36" cy="44" r="11" fill="url(#ball3)"/>
  <ellipse cx="36" cy="44" rx="2.5" ry="11" fill="#1a1400" opacity="0.5"/>
  <ellipse cx="36" cy="44" rx="11" ry="2.5" fill="#1a1400" opacity="0.5"/>

  <!-- texte NTX en bas -->
  <text x="64" y="122" font-family="Arial Black, sans-serif" font-size="11"
        font-weight="900" fill="#e8c800" text-anchor="middle" letter-spacing="3">NTX</text>
</svg>
